name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax-check every module (no third-party deps needed)
        run: python -m compileall -q analysis data_sources scripts shared

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest

      - name: Run unit tests
        # The math suite is pure-stdlib, so it runs without the runtime deps.
        run: pytest
